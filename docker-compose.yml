services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      BACKEND_HOST: "0.0.0.0"
      BACKEND_PORT: "8000"
      DATABASE_URL: "postgresql+psycopg2://chat_aggregator:chat_aggregator@postgres:5432/chat_aggregator"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./storage:/storage

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "echo 'frontend scaffold' && sleep infinity"]
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chat_aggregator
      POSTGRES_USER: chat_aggregator
      POSTGRES_PASSWORD: chat_aggregator
    ports:
      - "5432:5432"
    volumes:
      - ./storage/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_aggregator -d chat_aggregator"]
      interval: 5s
      timeout: 5s
      retries: 10

