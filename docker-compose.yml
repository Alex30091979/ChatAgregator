version: "3.9"

services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    command: ["sh", "-c", "echo 'backend scaffold' && sleep infinity"]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./storage:/storage

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "echo 'frontend scaffold' && sleep infinity"]
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app

